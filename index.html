    .quiz-mode-tab.active { background: #0f766e; color: white; }
    .quiz-mode { display: none; }
    .quiz-mode.active { display: block; }
    .quiz-card { background: white; border: 1px solid #d9e1e8; border-radius: 14px; box-shadow: 0 10px 24px rgba(15, 23, 42, .08); padding: 18px; margin-bottom: 14px; }

    .brief-item { border: 1px solid #d9e1e8; border-radius: 12px; background: #fbfdff; padding: 12px; }
    .brief-item strong { display: block; color: #115e59; margin-bottom: 4px; }

    .choice-btn { border: 1px solid #cbd5e1; border-radius: 12px; padding: 12px 18px; font-weight: 900; cursor: pointer; background: white; color: #111827; }
    .choice-btn.active { border-color: #0f766e; background: #ccfbf1; color: #115e59; box-shadow: 0 0 0 3px rgba(13,148,136,.18); }

    &lt;section id=&quot;prefixes&quot;&gt;
      &lt;h2&gt;Aircraft Prefixes&lt;/h2&gt;
      &lt;div class=&quot;grid&quot;&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;AH&lt;/strong&gt;Attack Helicopter&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;UH&lt;/strong&gt;Utility Helicopter&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;CH&lt;/strong&gt;Cargo Helicopter&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;LUH&lt;/strong&gt;Light Utility Helicopter&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;OH&lt;/strong&gt;Observation Helicopter&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;HH&lt;/strong&gt;Hospital Helicopter&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;MH&lt;/strong&gt;Multi-Mission Helicopter&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;MV&lt;/strong&gt;Multi-Mission Vertical Take-off/Landing&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;UAS/UAV&lt;/strong&gt;Unmanned Aircraft System / Vehicle&lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section id=&quot;safety&quot;&gt;
      &lt;h2&gt;Safety, Approach, Departure, and Emergencies&lt;/h2&gt;
      &lt;h3&gt;Safety Basics&lt;/h3&gt;
      &lt;ul class=&quot;two-col&quot;&gt;
        &lt;li&gt;Always have ID card, ID tags, and earplugs.&lt;/li&gt;
        &lt;li&gt;Helmet on; chinstrap fastened with no twists.&lt;/li&gt;
        &lt;li&gt;Weapons: muzzle down, no round chambered, selector on safe.&lt;/li&gt;
        &lt;li&gt;Sleeves down to protect from debris and flash fires.&lt;/li&gt;
        &lt;li&gt;Secure loose gear IAW SOP.&lt;/li&gt;
        &lt;li&gt;Stay away from main rotor, tail rotor, cargo hook, and static electricity.&lt;/li&gt;
        &lt;li&gt;Seatbelt always fastened.&lt;/li&gt;
      &lt;/ul&gt;

      &lt;div class=&quot;table-wrap compact&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Aircraft&lt;/th&gt;&lt;th&gt;Approach / Departure&lt;/th&gt;&lt;th&gt;Crash Position&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;General&lt;/td&gt;&lt;td&gt;Approach/depart from downslope side.&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;LUH-72A&lt;/td&gt;&lt;td&gt;45° from front when running; 90° from side when stopped.&lt;/td&gt;&lt;td&gt;Sit upright, muzzle down.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;UH-60&lt;/td&gt;&lt;td&gt;90° from side.&lt;/td&gt;&lt;td&gt;Sit upright, muzzle down.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;CH-47&lt;/td&gt;&lt;td&gt;45° from rear.&lt;/td&gt;&lt;td&gt;Bent forward at waist, muzzle down.&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;div class=&quot;note warn&quot;&gt;
        &lt;strong&gt;Crash procedures:&lt;/strong&gt; Follow crew commands, wait for rotors to stop, exit 3, 9, or 12 o’clock; for CH-47 also 6 o’clock; move 100 meters away. Fire extinguishers are for people.
      &lt;/div&gt;

      &lt;div class=&quot;table-wrap compact&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Aircraft&lt;/th&gt;&lt;th&gt;Exits&lt;/th&gt;&lt;th&gt;First Aid Kits&lt;/th&gt;&lt;th&gt;Fire Extinguishers&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;LUH-72A&lt;/td&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;1&lt;/td&gt;&lt;td&gt;1&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;UH-60&lt;/td&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;3&lt;/td&gt;&lt;td&gt;2&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;CH-47&lt;/td&gt;&lt;td&gt;10&lt;/td&gt;&lt;td&gt;7&lt;/td&gt;&lt;td&gt;3&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section id=&quot;medevac&quot;&gt;
      &lt;h2&gt;MEDEVAC / CASEVAC&lt;/h2&gt;
      &lt;div class=&quot;grid&quot;&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;MEDEVAC&lt;/strong&gt;Casualty movement with medical professionals providing en route care.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;CASEVAC&lt;/strong&gt;Casualty movement without en route care.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;MASCAS / MASCAL&lt;/strong&gt;Casualties exceed unit support capability.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;MTF&lt;/strong&gt;Medical Treatment Facility.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Litter&lt;/strong&gt;Unable to walk.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Ambulatory&lt;/strong&gt;Able to walk.&lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Aircraft&lt;/th&gt;&lt;th&gt;Markings&lt;/th&gt;&lt;th&gt;Crew&lt;/th&gt;&lt;th&gt;ACL&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;LUH-72A MEDEVAC&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;4 markings&lt;/td&gt;&lt;td&gt;4: pilot, co-pilot, crew chief, in-flight medic&lt;/td&gt;&lt;td&gt;2 litters w/1 medic OR 5 ambulatory&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;HH-60M&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;5 markings&lt;/td&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;Normal: 4 litters + 1 ambulatory. Prior notification: 6 litters OR 6 ambulatory.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;UH-60Q&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;5 markings&lt;/td&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;Normal: 4 litters + 1 ambulatory. Without hoist: 6 litters + 1 ambulatory OR 7 ambulatory. With hoist: 3 litters + 1 ambulatory OR 4 ambulatory.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;CH-47 MEDEVAC&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;None&lt;/td&gt;&lt;td&gt;4: pilot, co-pilot, crew chief, flight engineer&lt;/td&gt;&lt;td&gt;24 litters + 1 ambulatory OR 31 ambulatory&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;h3&gt;MEDEVAC Loading / Memory Notes&lt;/h3&gt;
      &lt;ul&gt;
        &lt;li&gt;First MEDEVAC helicopter: OH-13 Sioux.&lt;/li&gt;
        &lt;li&gt;OH-13 disadvantages: no in-flight care, exposed to weather/temperature, exposed to enemy fire.&lt;/li&gt;
        &lt;li&gt;Loading sequence: ambulatory loaded first or last; litters loaded in Z pattern; most seriously injured loaded last.&lt;/li&gt;
        &lt;li&gt;CH-47 medic ratio: 1 medic per 6 patients.&lt;/li&gt;
        &lt;li&gt;CH-47 litter/ambulatory combos: 0/31, 4/25, 8/19, 12/16 normal, 16/10, 20/4, 24/1.&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/section&gt;

    &lt;section id=&quot;hoist&quot;&gt;
      &lt;h2&gt;Hoist / Extraction Equipment&lt;/h2&gt;
      &lt;div class=&quot;table-wrap compact&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Equipment&lt;/th&gt;&lt;th&gt;Key Data&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;High Performance Utility Hoist&lt;/td&gt;&lt;td&gt;TS 600 lbs; cable TS 600 lbs; cable 256 ft, 250 ft usable; slow: 600 lbs at 125 ft/min; fast: 300 lbs at 250 ft/min.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Jungle Forest Penetrator&lt;/td&gt;&lt;td&gt;Thick vegetation; TS 600 lbs; ACL 3 ambulatory.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Kendrick’s Extraction Device&lt;/td&gt;&lt;td&gt;Suspected spinal injury; TS 400 lbs; ACL 1 litter.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Basic Rigged Litter&lt;/td&gt;&lt;td&gt;Ground evacuation; TS 400 lbs; ACL 1 litter.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;SKED Rescue System&lt;/td&gt;&lt;td&gt;Ground/water evacuation; TS 400 lbs; ACL 1 litter.&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section id=&quot;nine-line&quot;&gt;
      &lt;h2&gt;9-Line MEDEVAC&lt;/h2&gt;
      &lt;div class=&quot;table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Line&lt;/th&gt;&lt;th&gt;What It Is&lt;/th&gt;&lt;th&gt;Key Codes / Notes&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;1&lt;/td&gt;&lt;td&gt;Location&lt;/td&gt;&lt;td&gt;6-digit grid.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;2&lt;/td&gt;&lt;td&gt;Radio frequency / call sign / suffix&lt;/td&gt;&lt;td&gt;Contact info.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;3&lt;/td&gt;&lt;td&gt;Patients by precedence&lt;/td&gt;&lt;td&gt;1 Urgent, 1A Urgent Surgical, 2 Priority, 3 Routine, 4 Convenience.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;Special equipment&lt;/td&gt;&lt;td&gt;A None, B Hoist, C Extraction equipment, D Ventilator.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;5&lt;/td&gt;&lt;td&gt;Patients by type&lt;/td&gt;&lt;td&gt;L + number, A + number.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;6&lt;/td&gt;&lt;td&gt;Security / wounds&lt;/td&gt;&lt;td&gt;Wartime: N, P, E, X. Peacetime: number/type of wounds, injuries, illness.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;7&lt;/td&gt;&lt;td&gt;Marking pickup site&lt;/td&gt;&lt;td&gt;A panels, B pyrotechnic, C smoke, D none, E other.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;8&lt;/td&gt;&lt;td&gt;Nationality&lt;/td&gt;&lt;td&gt;A US mil, B US civilian, C non-US mil, D non-US civilian, E EPW.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;9&lt;/td&gt;&lt;td&gt;CBRN / terrain&lt;/td&gt;&lt;td&gt;Wartime: C, B, R, N. Peacetime: terrain description.&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;
      &lt;div class=&quot;note&quot;&gt;
        &lt;strong&gt;Remember:&lt;/strong&gt; Lines 1–5 get aircraft in the air. Lines 6–9 can be sent while aircraft is flying.
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section id=&quot;air-assault&quot;&gt;
      &lt;h2&gt;Air Assault Operations&lt;/h2&gt;
      &lt;div class=&quot;grid&quot;&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Air assault operations&lt;/strong&gt;Movement of friendly assault forces by rotary-wing aircraft to engage enemy forces.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Air movement operations&lt;/strong&gt;Air transport of units, personnel, equipment, and supplies.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Air assault&lt;/strong&gt;Vertical envelopment to surprise enemy and achieve an unopposed landing.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;AATF&lt;/strong&gt;Temporary integrated force tailored to the mission.&lt;/div&gt;
      &lt;/div&gt;

      &lt;h3&gt;Levels&lt;/h3&gt;
      &lt;ul&gt;
        &lt;li&gt;&lt;strong&gt;Division:&lt;/strong&gt; lowest level with resources/assets for AASLT.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Battalion:&lt;/strong&gt; lowest level that can plan and coordinate AASLT.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Company:&lt;/strong&gt; lowest level that can execute AASLT.&lt;/li&gt;
      &lt;/ul&gt;

      &lt;h3&gt;Reverse Planning: GLALS&lt;/h3&gt;
      &lt;ol&gt;
        &lt;li&gt;Ground Tactical Plan&lt;/li&gt;
        &lt;li&gt;Landing Plan&lt;/li&gt;
        &lt;li&gt;Air Movement Plan&lt;/li&gt;
        &lt;li&gt;Loading Plan&lt;/li&gt;
        &lt;li&gt;Staging Plan&lt;/li&gt;
      &lt;/ol&gt;

      &lt;h3&gt;Air Movement Terms&lt;/h3&gt;
      &lt;div class=&quot;grid&quot;&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Chalk&lt;/strong&gt;Same as load; personnel/equipment moved by one aircraft.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Serial&lt;/strong&gt;Two or more aircraft under a serial commander, grouped by time/space.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Lift&lt;/strong&gt;All aircraft assigned to the mission.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;H-Hour&lt;/strong&gt;First aircraft of first lift lands at LZ.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Flight time&lt;/strong&gt;PZ to SP and RP to LZ = 2 minutes.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Loading time&lt;/strong&gt;3 min day; 5 min night.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section id=&quot;pz-lz&quot;&gt;
      &lt;h2&gt;PZ / LZ Operations&lt;/h2&gt;
      &lt;div class=&quot;note&quot;&gt;
        &lt;strong&gt;Technical factors: FLOARSS&lt;/strong&gt; — Formation/number of aircraft, Loads, Obstacles, Atmospheric conditions, Routes, Surface conditions, Size/type of aircraft.
      &lt;/div&gt;

      &lt;h3&gt;HLP / TDP Sizes&lt;/h3&gt;
      &lt;div class=&quot;table-wrap compact&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Size&lt;/th&gt;&lt;th&gt;Diameter&lt;/th&gt;&lt;th&gt;Use&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;Size 1&lt;/td&gt;&lt;td&gt;25 m&lt;/td&gt;&lt;td&gt;Small observation.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Size 2&lt;/td&gt;&lt;td&gt;35 m&lt;/td&gt;&lt;td&gt;Small utility/attack.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Size 3&lt;/td&gt;&lt;td&gt;50 m&lt;/td&gt;&lt;td&gt;Large utility/attack.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Size 4&lt;/td&gt;&lt;td&gt;80 m&lt;/td&gt;&lt;td&gt;Cargo.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Size 5&lt;/td&gt;&lt;td&gt;100 m&lt;/td&gt;&lt;td&gt;Sling loads / unknown aircraft.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Size 6&lt;/td&gt;&lt;td&gt;125 m&lt;/td&gt;&lt;td&gt;Sling loads using long lines.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Size 7&lt;/td&gt;&lt;td&gt;150 m&lt;/td&gt;&lt;td&gt;Night sling loads.&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;h3&gt;Marking / Controlling&lt;/h3&gt;
      &lt;ul&gt;
        &lt;li&gt;Phases: selecting, marking, controlling.&lt;/li&gt;
        &lt;li&gt;Obstacles: anything 18 in high/wide/deep. Use 4 R’s: remove, reduce, mark red, radio.&lt;/li&gt;
        &lt;li&gt;Ground slope: 0–7° all aircraft; 8–15° cargo and medium utility can land with advisory.&lt;/li&gt;
        &lt;li&gt;Slope formula: vertical distance × 57.3 / horizontal distance.&lt;/li&gt;
        &lt;li&gt;Approach/departure: obstacle buffer 10:1 reducible to 5:1; no crosswind over 9 kts; no tailwind over 5 kts.&lt;/li&gt;
        &lt;li&gt;HAT = humidity, altitude, temperature.&lt;/li&gt;
        &lt;li&gt;Nine NATO formations: trail, staggered trail right, staggered trail left, echelon right, echelon left, heavy right, heavy left, vee, diamond. Diamond = most secure.&lt;/li&gt;
      &lt;/ul&gt;

      &lt;h3&gt;Night Markings&lt;/h3&gt;
      &lt;div class=&quot;grid&quot;&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Inverted Y&lt;/strong&gt;Directional light at top, base light 7 m down, landing zone 14 m from there, stem lights 7 m out to sides; marks first TDP at night.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;NATO T&lt;/strong&gt;Base light top, flankers 10 m from base, directional light 10 m down, stem light 10 m down from directional.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Control Methods&lt;/strong&gt;Visual, electronic, verbal.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;p class=&quot;footer&quot;&gt;Good luck on your test! Created by one of your own. &lt;/p&gt;
  &lt;/main&gt;

    &lt;section id=&quot;overview&quot;&gt;

        &lt;strong&gt;Phase II = sling-load operations.&lt;/strong&gt; Focus on who does what, which TM covers what, aircraft hook limits, rigging equipment capacities, common load data, link counts, and inspection criteria.
      &lt;/div&gt;
      &lt;div class=&quot;grid&quot;&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;A-22 Minimum Weight&lt;/strong&gt;&lt;span class=&quot;flash&quot;&gt;500 lbs&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Qualified Inspector&lt;/strong&gt;&lt;span class=&quot;flash&quot;&gt;E-4 / SPC or above&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Three Units&lt;/strong&gt;Supported unit, aviation unit, receiving unit.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Lift Capacity Factors&lt;/strong&gt;Wind, Humidity, Altitude, Temperature, Fuel.&lt;/div&gt;

            &lt;tr&gt;&lt;td&gt;Field-expedient static discharge wand&lt;/td&gt;&lt;td&gt;&lt;strong&gt;TM 4-48.09, Appendix D&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;AMB&lt;/td&gt;&lt;td&gt;&lt;strong&gt;Air Mission Brief&lt;/strong&gt;&lt;/td&gt;&lt;/tr&gt;

      &lt;h3&gt;Unit Responsibilities&lt;/h3&gt;
      &lt;div class=&quot;grid&quot;&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Supported Unit&lt;/strong&gt;Selects, prepares, and controls the PZ; stores, inspects, and maintains sling-load equipment; secures sensitive items.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Aviation Unit&lt;/strong&gt;Coordinates with supported/receiving units, assists with recovery and return of equipment, and establishes safety procedures.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Receiving Unit&lt;/strong&gt;Selects, prepares, and controls the LZ; provides trained ground crews; derigs loads; inspects back loads.&lt;/div&gt;
      &lt;/div&gt;
      &lt;h3&gt;Load Classification&lt;/h3&gt;
      &lt;ul&gt;
        &lt;li&gt;&lt;strong&gt;Certified load:&lt;/strong&gt; equipment and rigging procedures have completed sling-load certification testing.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Unique load:&lt;/strong&gt; one-time or low-frequency load, approved by high-risk approving authority, O-6 or above.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Prohibited load:&lt;/strong&gt; unstable flight characteristics; &lt;strong&gt;do not fly&lt;/strong&gt;.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Suitable load:&lt;/strong&gt; not certified, but demonstrated acceptable static lift and flight characteristics during a flight test.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Inspector rule:&lt;/strong&gt; qualified inspector must be E-4/SPC or above and Pathfinder, Air Assault, or SLICC graduate.&lt;/li&gt;

    function resizeFrame(frame) {

        const doc = frame.contentWindow.document;

        frame.style.height = height + 'px';

    function scrollParentToFrameTarget(frame, target) {
      const targetTop = target.getBoundingClientRect().top;
      const frameTop = frame.getBoundingClientRect().top;
      const top = window.scrollY + frameTop + targetTop - getHeaderOffset();
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    }

    function setupFrameNavigation(frame) {
      try {
        const doc = frame.contentWindow.document;
        doc.querySelectorAll('a[href^="#"]').forEach(function (link) {
          if (link.dataset.parentScrollReady === 'true') return;
          link.dataset.parentScrollReady = 'true';
          link.addEventListener('click', function (event) {
            const id = link.getAttribute('href').slice(1);
            const target = doc.getElementById(id);
            if (!target) return;

            event.preventDefault();
            resizeFrame(frame);
            scrollParentToFrameTarget(frame, target);
          });
        });

        // srcdoc frames are same-origin; this fallback keeps the wrapper usable if that ever changes.

          '<div class="quiz-card" data-index="' + index + '">',
          '<label for="quizAnswer' + index + '">' + (index + 1) + '. ' + question.prompt + '</label>',
          '<input id="quizAnswer' + index + '" type="text" autocomplete="off" placeholder="enter value" />',
          '<div class="quiz-feedback" id="quizFeedback' + index + '"></div>',
          '</div>'
        ].join('');
      }).join('');
    }

    function submitQuiz() {
      let correctCount = 0;
      currentQuizQuestions.forEach(function (question, index) {
        const input = document.getElementById('quizAnswer' + index);
        const feedback = document.getElementById('quizFeedback' + index);
        const normalizedInput = normalizeQuizAnswer(input.value);
        const acceptedAnswers = question.answers.map(normalizeQuizAnswer);
        const isCorrect = acceptedAnswers.includes(normalizedInput);
        if (isCorrect) correctCount += 1;

        feedback.className = 'quiz-feedback ' + (isCorrect ? 'correct' : 'wrong');
        feedback.textContent = isCorrect
          ? 'Correct: ' + question.answer
          : 'Wrong. Correct answer: ' + question.answer;
      });

      const score = document.getElementById('quizScore');
      score.textContent = 'Score: ' + correctCount + ' / ' + currentQuizQuestions.length;
      score.classList.add('active');
    }

    function renderDeficiencies() {
      const deficiencyList = document.getElementById('deficiencyList');
      deficiencyList.innerHTML = deficiencyGroups.map(function (group) {
        return [
          '<section class="quiz-card deficiency-card">',
          '<h2>' + group.title + '</h2>',
          '<ul>',
          group.items.map(function (item) { return '<li>' + item + '</li>'; }).join(''),
          '</ul>',
          '</section>'
        ].join('');
      }).join('');
    }

    function randomChoice(items) {
      return items[Math.floor(Math.random() * items.length)];
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function formatWeight(weight) {
      return weight.toLocaleString('en-US') + ' lbs';
    }

    function validateSlingloadBrief(brief) {
      const weightValid = brief.weight >= brief.load.min && brief.weight <= brief.load.max;
      let spacerValid = true;
      let chrpValid = true;
      let aircraftRuleValid = true;
      let spacerExplanation = '';
      let chrpExplanation = '';
      let aircraftExplanation = '';

      if (brief.aircraft === 'UH-60') {
        if (brief.chrp) {
          spacerExplanation = 'Spacer requirement not applicable: this brief uses CHRP, so spacer information is removed and does not affect the answer.';
          chrpValid = brief.chrp === '11K CHRP';
          chrpExplanation = chrpValid
            ? 'CHRP selection valid: UH-60 may use 11K CHRP.'
            : 'CHRP selection invalid: UH-60 may use 11K CHRP, but 25K CHRP is not allowed.';
        } else {
          chrpExplanation = 'CHRP selection not used: CHRP rules do not apply because this brief uses spacer/no-spacer information instead.';
          if (brief.slingLeg === '10K sling leg') {
            spacerValid = brief.hasSpacer;
            spacerExplanation = brief.hasSpacer
              ? 'Spacer requirement followed: UH-60 with a 10K sling leg requires a spacer, and this brief uses one.'
              : 'Spacer requirement not followed: UH-60 with a 10K sling leg requires a spacer, but this brief does not use one.';
          } else {
            spacerValid = !brief.hasSpacer;
            spacerExplanation = brief.hasSpacer
              ? 'Spacer requirement not followed: UH-60 with a 25K sling leg must not use a spacer, but this brief uses one.'
              : 'Spacer requirement followed: UH-60 with a 25K sling leg must not use a spacer, and this brief does not use one.';
          }
        }

        aircraftRuleValid = spacerValid && chrpValid;
        aircraftExplanation = aircraftRuleValid
          ? 'Aircraft-specific UH-60 rules were followed.'
          : 'Aircraft-specific UH-60 rules were not followed.';
      } else {
        spacerExplanation = brief.chrp
          ? 'Spacer requirement not applicable: this brief uses CHRP, so spacer information is removed and does not affect the answer.'
          : 'Spacer requirement: CH-47 spacer requirements do not matter, so this spacer choice is acceptable.';
        chrpExplanation = brief.chrp
          ? 'CHRP selection valid: CH-47 may use either 11K CHRP or 25K CHRP unless another rule is violated.'
          : 'CHRP selection not used: CHRP rules do not apply because this brief uses spacer/no-spacer information instead.';
        aircraftExplanation = 'Aircraft-specific CH-47 rules were followed; sling leg and CHRP combinations are valid unless another rule is violated.';
      }

      const weightExplanation = weightValid
        ? 'Load weight is within range: ' + brief.load.name + ' allows ' + formatWeight(brief.load.min) + ' to ' + formatWeight(brief.load.max) + '.'
        : 'Load weight is out of range: ' + brief.load.name + ' allows ' + formatWeight(brief.load.min) + ' to ' + formatWeight(brief.load.max) + '.';
      const isValid = weightValid && aircraftRuleValid && spacerValid && chrpValid;

      return {
        isValid: isValid,
        weightValid: weightValid,
        aircraftRuleValid: aircraftRuleValid,
        spacerValid: spacerValid,
        chrpValid: chrpValid,
        explanations: [weightExplanation, aircraftExplanation, spacerExplanation, chrpExplanation]
      };
    }

    function createRandomSlingloadBrief() {
      const load = randomChoice(slingloadTypes);
      const usesChrp = Math.random() < 0.5;
      return {
        load: load,
        weight: randomInt(Math.max(0, load.min - 1500), load.max + 1500),
        aircraft: randomChoice(aircraftTypes),
        slingLeg: randomChoice(slingLegTypes),
        chrp: usesChrp ? randomChoice(chrpTypes) : null,
        hasSpacer: usesChrp ? false : Math.random() < 0.5
      };
    }

    function generateSlingloadBrief() {
      const shouldBeValid = Math.random() < 0.5;
      let brief = null;

      for (let attempt = 0; attempt < 200; attempt += 1) {
        const candidate = createRandomSlingloadBrief();
        if (validateSlingloadBrief(candidate).isValid === shouldBeValid) {
          brief = candidate;
          break;
        }
      }

      if (!brief) {
        const load = randomChoice(slingloadTypes);
        brief = {
          load: load,
          weight: randomInt(load.min, load.max),
          aircraft: 'UH-60',
          slingLeg: '10K sling leg',
          chrp: null,
          hasSpacer: shouldBeValid
        };
      }

      currentSlingloadBrief = brief;
      selectedSlingloadGuess = null;
      renderSlingloadBrief();
    }

    function renderSlingloadBrief() {
      const brief = currentSlingloadBrief;
      const briefWrap = document.getElementById('slingloadBrief');
      const feedback = document.getElementById('slingloadFeedback');
      document.getElementById('slingCorrectBtn').classList.remove('active');
      document.getElementById('slingIncorrectBtn').classList.remove('active');
      feedback.className = 'slingload-feedback';
      feedback.innerHTML = '';
      const briefItems = [
        ['Slingload Type', brief.load.name],
        ['Load Weight', formatWeight(brief.weight)],
        ['Aircraft Type', brief.aircraft],
        ['Sling Leg Type', brief.slingLeg]
      ];
      if (brief.chrp) {
        briefItems.push(['CHRP Type', brief.chrp]);
      } else {
        briefItems.push(['Spacer Information', brief.hasSpacer ? 'Spacer used' : 'No spacer used']);
      }
      briefWrap.innerHTML = briefItems.map(function (item) {
        return '<div class="brief-item"><strong>' + item[0] + '</strong>' + item[1] + '</div>';
      }).join('');
    }

    function chooseSlingloadGuess(guess) {
      selectedSlingloadGuess = guess;
      document.getElementById('slingCorrectBtn').classList.toggle('active', guess === true);
      document.getElementById('slingIncorrectBtn').classList.toggle('active', guess === false);
    }

    function submitSlingloadGuess() {
      const feedback = document.getElementById('slingloadFeedback');
      if (selectedSlingloadGuess === null) {
        feedback.className = 'slingload-feedback active wrong';
        feedback.textContent = 'Choose Correct or Incorrect before submitting.';
        return;
      }

      const result = validateSlingloadBrief(currentSlingloadBrief);
      const userWasCorrect = selectedSlingloadGuess === result.isValid;
      feedback.className = 'slingload-feedback active' + (userWasCorrect ? '' : ' wrong');
      feedback.innerHTML = [
        '<strong>' + (userWasCorrect ? 'Correct.' : 'Incorrect.') + '</strong> This load brief is <strong>' + (result.isValid ? 'correct' : 'incorrect') + '</strong>.',
        '<ul>',
        result.explanations.map(function (explanation) { return '<li>' + explanation + '</li>'; }).join(''),
        '</ul>'
      ].join('');
    }

    function switchQuizMode(mode) {
      const isSlingload = mode === 'slingload';
      const isDeficiencies = mode === 'deficiencies';
      document.getElementById('numberQuizMode').classList.toggle('active', !isSlingload && !isDeficiencies);
      document.getElementById('slingloadTestMode').classList.toggle('active', isSlingload);
      document.getElementById('deficienciesMode').classList.toggle('active', isDeficiencies);
      document.getElementById('numberQuizModeBtn').classList.toggle('active', !isSlingload && !isDeficiencies);
      document.getElementById('slingloadModeBtn').classList.toggle('active', isSlingload);
      document.getElementById('deficienciesModeBtn').classList.toggle('active', isDeficiencies);
      document.getElementById('numberQuizModeBtn').setAttribute('aria-selected', String(!isSlingload && !isDeficiencies));
      document.getElementById('slingloadModeBtn').setAttribute('aria-selected', String(isSlingload));
      document.getElementById('deficienciesModeBtn').setAttribute('aria-selected', String(isDeficiencies));
      if (isSlingload && !currentSlingloadBrief) generateSlingloadBrief();
    }

    function showQuiz() {
      const phase1Frame = document.getElementById('phase1Frame');
      const phase2Frame = document.getElementById('phase2Frame');
      const quizPanel = document.getElementById('quizPanel');
      const phase1Btn = document.getElementById('phase1Btn');
      const phase2Btn = document.getElementById('phase2Btn');
      const quizBtn = document.getElementById('quizBtn');

      phase1Frame.classList.remove('active');
      phase2Frame.classList.remove('active');
      quizPanel.classList.add('active');
      phase1Btn.classList.remove('active');
      phase2Btn.classList.remove('active');
      quizBtn.classList.add('active');
      phase1Btn.setAttribute('aria-pressed', 'false');
      phase2Btn.setAttribute('aria-pressed', 'false');
      quizBtn.setAttribute('aria-pressed', 'true');
      document.title = 'Air Assault Phase 2 Quiz';
      if (!currentQuizQuestions.length) renderQuiz();
      window.scrollTo({ top: 0, behavior: 'auto' });
    }

    function showPhase(phase) {
      const phase1Frame = document.getElementById('phase1Frame');
      const phase2Frame = document.getElementById('phase2Frame');
      const quizPanel = document.getElementById('quizPanel');
      const phase1Btn = document.getElementById('phase1Btn');
      const phase2Btn = document.getElementById('phase2Btn');
      const quizBtn = document.getElementById('quizBtn');
      const isPhase2 = phase === 'phase2';
      const activeFrame = isPhase2 ? phase2Frame : phase1Frame;
      phase1Frame.classList.toggle('active', !isPhase2);
      phase2Frame.classList.toggle('active', isPhase2);
      quizPanel.classList.remove('active');
      phase1Btn.classList.toggle('active', !isPhase2);
      phase2Btn.classList.toggle('active', isPhase2);
      quizBtn.classList.remove('active');
      phase1Btn.setAttribute('aria-pressed', String(!isPhase2));
      phase2Btn.setAttribute('aria-pressed', String(isPhase2));
      quizBtn.setAttribute('aria-pressed', 'false');
      document.title = isPhase2 ? 'Air Assault Phase II Study Sheet' : 'Air Assault Phase I Study Sheet';
      try {
        activeFrame.contentWindow.scrollTo(0, 0);
        activeFrame.contentWindow.location.hash = '';
      } catch (e) {}
      window.scrollTo({ top: 0, behavior: 'auto' });
      setupFrameNavigation(activeFrame);
      setTimeout(resizeVisibleFrame, 50);
      setTimeout(resizeVisibleFrame, 300);
    }

    window.addEventListener('load', function () {
      document.querySelectorAll('iframe').forEach(function (frame) {
        frame.addEventListener('load', function () {
          resizeFrame(frame);
          setupFrameNavigation(frame);
        });
        resizeFrame(frame);
        setupFrameNavigation(frame);
      });
      setTimeout(resizeVisibleFrame, 50);
      setTimeout(resizeVisibleFrame, 300);
      setTimeout(resizeVisibleFrame, 1000);
      document.getElementById('newQuizBtn').addEventListener('click', renderQuiz);
      document.getElementById('submitQuizBtn').addEventListener('click', submitQuiz);
      document.getElementById('numberQuizModeBtn').addEventListener('click', function () { switchQuizMode('number'); });
      document.getElementById('slingloadModeBtn').addEventListener('click', function () { switchQuizMode('slingload'); });
      document.getElementById('deficienciesModeBtn').addEventListener('click', function () { switchQuizMode('deficiencies'); });
      document.getElementById('newSlingloadBtn').addEventListener('click', generateSlingloadBrief);
      document.getElementById('slingCorrectBtn').addEventListener('click', function () { chooseSlingloadGuess(true); });
      document.getElementById('slingIncorrectBtn').addEventListener('click', function () { chooseSlingloadGuess(false); });
      document.getElementById('submitSlingloadBtn').addEventListener('click', submitSlingloadGuess);
      renderQuiz();
      generateSlingloadBrief();
      renderDeficiencies();
    });
    window.addEventListener('resize', resizeVisibleFrame);
  </script>
</body>
</html>
