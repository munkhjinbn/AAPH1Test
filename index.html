    &lt;section id=&quot;safety&quot;&gt;
      &lt;h2&gt;Safety, Approach, Departure, and Emergencies&lt;/h2&gt;
      &lt;h3&gt;Safety Basics&lt;/h3&gt;
      &lt;ul class=&quot;two-col&quot;&gt;
        &lt;li&gt;Always have ID card, ID tags, and earplugs.&lt;/li&gt;
        &lt;li&gt;Helmet on; chinstrap fastened with no twists.&lt;/li&gt;
        &lt;li&gt;Weapons: muzzle down, no round chambered, selector on safe.&lt;/li&gt;
        &lt;li&gt;Sleeves down to protect from debris and flash fires.&lt;/li&gt;
        &lt;li&gt;Secure loose gear IAW SOP.&lt;/li&gt;
        &lt;li&gt;Stay away from main rotor, tail rotor, cargo hook, and static electricity.&lt;/li&gt;
        &lt;li&gt;Seatbelt always fastened.&lt;/li&gt;
      &lt;/ul&gt;

      &lt;div class=&quot;table-wrap compact&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Aircraft&lt;/th&gt;&lt;th&gt;Approach / Departure&lt;/th&gt;&lt;th&gt;Crash Position&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;General&lt;/td&gt;&lt;td&gt;Approach/depart from downslope side.&lt;/td&gt;&lt;td&gt;—&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;LUH-72A&lt;/td&gt;&lt;td&gt;45° from front when running; 90° from side when stopped.&lt;/td&gt;&lt;td&gt;Sit upright, muzzle down.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;UH-60&lt;/td&gt;&lt;td&gt;90° from side.&lt;/td&gt;&lt;td&gt;Sit upright, muzzle down.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;CH-47&lt;/td&gt;&lt;td&gt;45° from rear.&lt;/td&gt;&lt;td&gt;Bent forward at waist, muzzle down.&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;div class=&quot;note warn&quot;&gt;
        &lt;strong&gt;Crash procedures:&lt;/strong&gt; Follow crew commands, wait for rotors to stop, exit 3, 9, or 12 o’clock; for CH-47 also 6 o’clock; move 100 meters away. Fire extinguishers are for people.
      &lt;/div&gt;

      &lt;div class=&quot;table-wrap compact&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Aircraft&lt;/th&gt;&lt;th&gt;Exits&lt;/th&gt;&lt;th&gt;First Aid Kits&lt;/th&gt;&lt;th&gt;Fire Extinguishers&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;LUH-72A&lt;/td&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;1&lt;/td&gt;&lt;td&gt;1&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;UH-60&lt;/td&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;3&lt;/td&gt;&lt;td&gt;2&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;CH-47&lt;/td&gt;&lt;td&gt;10&lt;/td&gt;&lt;td&gt;7&lt;/td&gt;&lt;td&gt;3&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section id=&quot;medevac&quot;&gt;
      &lt;h2&gt;MEDEVAC / CASEVAC&lt;/h2&gt;
      &lt;div class=&quot;grid&quot;&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;MEDEVAC&lt;/strong&gt;Casualty movement with medical professionals providing en route care.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;CASEVAC&lt;/strong&gt;Casualty movement without en route care.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;MASCAS / MASCAL&lt;/strong&gt;Casualties exceed unit support capability.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;MTF&lt;/strong&gt;Medical Treatment Facility.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Litter&lt;/strong&gt;Unable to walk.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Ambulatory&lt;/strong&gt;Able to walk.&lt;/div&gt;
      &lt;/div&gt;

      &lt;div class=&quot;table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Aircraft&lt;/th&gt;&lt;th&gt;Markings&lt;/th&gt;&lt;th&gt;Crew&lt;/th&gt;&lt;th&gt;ACL&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;LUH-72A MEDEVAC&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;4 markings&lt;/td&gt;&lt;td&gt;4: pilot, co-pilot, crew chief, in-flight medic&lt;/td&gt;&lt;td&gt;2 litters w/1 medic OR 5 ambulatory&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;HH-60M&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;5 markings&lt;/td&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;Normal: 4 litters + 1 ambulatory. Prior notification: 6 litters OR 6 ambulatory.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;UH-60Q&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;5 markings&lt;/td&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;Normal: 4 litters + 1 ambulatory. Without hoist: 6 litters + 1 ambulatory OR 7 ambulatory. With hoist: 3 litters + 1 ambulatory OR 4 ambulatory.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;&lt;strong&gt;CH-47 MEDEVAC&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;None&lt;/td&gt;&lt;td&gt;4: pilot, co-pilot, crew chief, flight engineer&lt;/td&gt;&lt;td&gt;24 litters + 1 ambulatory OR 31 ambulatory&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;h3&gt;MEDEVAC Loading / Memory Notes&lt;/h3&gt;
      &lt;ul&gt;
        &lt;li&gt;First MEDEVAC helicopter: OH-13 Sioux.&lt;/li&gt;
        &lt;li&gt;OH-13 disadvantages: no in-flight care, exposed to weather/temperature, exposed to enemy fire.&lt;/li&gt;
        &lt;li&gt;Loading sequence: ambulatory loaded first or last; litters loaded in Z pattern; most seriously injured loaded last.&lt;/li&gt;
        &lt;li&gt;CH-47 medic ratio: 1 medic per 6 patients.&lt;/li&gt;
        &lt;li&gt;CH-47 litter/ambulatory combos: 0/31, 4/25, 8/19, 12/16 normal, 16/10, 20/4, 24/1.&lt;/li&gt;
      &lt;/ul&gt;
    &lt;/section&gt;

    &lt;section id=&quot;hoist&quot;&gt;
      &lt;h2&gt;Hoist / Extraction Equipment&lt;/h2&gt;
      &lt;div class=&quot;table-wrap compact&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Equipment&lt;/th&gt;&lt;th&gt;Key Data&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;High Performance Utility Hoist&lt;/td&gt;&lt;td&gt;TS 600 lbs; cable TS 600 lbs; cable 256 ft, 250 ft usable; slow: 600 lbs at 125 ft/min; fast: 300 lbs at 250 ft/min.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Jungle Forest Penetrator&lt;/td&gt;&lt;td&gt;Thick vegetation; TS 600 lbs; ACL 3 ambulatory.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Kendrick’s Extraction Device&lt;/td&gt;&lt;td&gt;Suspected spinal injury; TS 400 lbs; ACL 1 litter.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Basic Rigged Litter&lt;/td&gt;&lt;td&gt;Ground evacuation; TS 400 lbs; ACL 1 litter.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;SKED Rescue System&lt;/td&gt;&lt;td&gt;Ground/water evacuation; TS 400 lbs; ACL 1 litter.&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section id=&quot;nine-line&quot;&gt;
      &lt;h2&gt;9-Line MEDEVAC&lt;/h2&gt;
      &lt;div class=&quot;table-wrap&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Line&lt;/th&gt;&lt;th&gt;What It Is&lt;/th&gt;&lt;th&gt;Key Codes / Notes&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;1&lt;/td&gt;&lt;td&gt;Location&lt;/td&gt;&lt;td&gt;6-digit grid.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;2&lt;/td&gt;&lt;td&gt;Radio frequency / call sign / suffix&lt;/td&gt;&lt;td&gt;Contact info.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;3&lt;/td&gt;&lt;td&gt;Patients by precedence&lt;/td&gt;&lt;td&gt;1 Urgent, 1A Urgent Surgical, 2 Priority, 3 Routine, 4 Convenience.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;4&lt;/td&gt;&lt;td&gt;Special equipment&lt;/td&gt;&lt;td&gt;A None, B Hoist, C Extraction equipment, D Ventilator.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;5&lt;/td&gt;&lt;td&gt;Patients by type&lt;/td&gt;&lt;td&gt;L + number, A + number.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;6&lt;/td&gt;&lt;td&gt;Security / wounds&lt;/td&gt;&lt;td&gt;Wartime: N, P, E, X. Peacetime: number/type of wounds, injuries, illness.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;7&lt;/td&gt;&lt;td&gt;Marking pickup site&lt;/td&gt;&lt;td&gt;A panels, B pyrotechnic, C smoke, D none, E other.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;8&lt;/td&gt;&lt;td&gt;Nationality&lt;/td&gt;&lt;td&gt;A US mil, B US civilian, C non-US mil, D non-US civilian, E EPW.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;9&lt;/td&gt;&lt;td&gt;CBRN / terrain&lt;/td&gt;&lt;td&gt;Wartime: C, B, R, N. Peacetime: terrain description.&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;
      &lt;div class=&quot;note&quot;&gt;
        &lt;strong&gt;Remember:&lt;/strong&gt; Lines 1–5 get aircraft in the air. Lines 6–9 can be sent while aircraft is flying.
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section id=&quot;air-assault&quot;&gt;
      &lt;h2&gt;Air Assault Operations&lt;/h2&gt;
      &lt;div class=&quot;grid&quot;&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Air assault operations&lt;/strong&gt;Movement of friendly assault forces by rotary-wing aircraft to engage enemy forces.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Air movement operations&lt;/strong&gt;Air transport of units, personnel, equipment, and supplies.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Air assault&lt;/strong&gt;Vertical envelopment to surprise enemy and achieve an unopposed landing.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;AATF&lt;/strong&gt;Temporary integrated force tailored to the mission.&lt;/div&gt;
      &lt;/div&gt;

      &lt;h3&gt;Levels&lt;/h3&gt;
      &lt;ul&gt;
        &lt;li&gt;&lt;strong&gt;Division:&lt;/strong&gt; lowest level with resources/assets for AASLT.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Battalion:&lt;/strong&gt; lowest level that can plan and coordinate AASLT.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Company:&lt;/strong&gt; lowest level that can execute AASLT.&lt;/li&gt;
      &lt;/ul&gt;

      &lt;h3&gt;Reverse Planning: GLALS&lt;/h3&gt;
      &lt;ol&gt;
        &lt;li&gt;Ground Tactical Plan&lt;/li&gt;
        &lt;li&gt;Landing Plan&lt;/li&gt;
        &lt;li&gt;Air Movement Plan&lt;/li&gt;
        &lt;li&gt;Loading Plan&lt;/li&gt;
        &lt;li&gt;Staging Plan&lt;/li&gt;
      &lt;/ol&gt;

      &lt;h3&gt;Air Movement Terms&lt;/h3&gt;
      &lt;div class=&quot;grid&quot;&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Chalk&lt;/strong&gt;Same as load; personnel/equipment moved by one aircraft.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Serial&lt;/strong&gt;Two or more aircraft under a serial commander, grouped by time/space.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Lift&lt;/strong&gt;All aircraft assigned to the mission.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;H-Hour&lt;/strong&gt;First aircraft of first lift lands at LZ.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Flight time&lt;/strong&gt;PZ to SP and RP to LZ = 2 minutes.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Loading time&lt;/strong&gt;3 min day; 5 min night.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section id=&quot;pz-lz&quot;&gt;
      &lt;h2&gt;PZ / LZ Operations&lt;/h2&gt;
      &lt;div class=&quot;note&quot;&gt;
        &lt;strong&gt;Technical factors: FLOARSS&lt;/strong&gt; — Formation/number of aircraft, Loads, Obstacles, Atmospheric conditions, Routes, Surface conditions, Size/type of aircraft.
      &lt;/div&gt;

      &lt;h3&gt;HLP / TDP Sizes&lt;/h3&gt;
      &lt;div class=&quot;table-wrap compact&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;
            &lt;tr&gt;&lt;th&gt;Size&lt;/th&gt;&lt;th&gt;Diameter&lt;/th&gt;&lt;th&gt;Use&lt;/th&gt;&lt;/tr&gt;
          &lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;Size 1&lt;/td&gt;&lt;td&gt;25 m&lt;/td&gt;&lt;td&gt;Small observation.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Size 2&lt;/td&gt;&lt;td&gt;35 m&lt;/td&gt;&lt;td&gt;Small utility/attack.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Size 3&lt;/td&gt;&lt;td&gt;50 m&lt;/td&gt;&lt;td&gt;Large utility/attack.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Size 4&lt;/td&gt;&lt;td&gt;80 m&lt;/td&gt;&lt;td&gt;Cargo.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Size 5&lt;/td&gt;&lt;td&gt;100 m&lt;/td&gt;&lt;td&gt;Sling loads / unknown aircraft.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Size 6&lt;/td&gt;&lt;td&gt;125 m&lt;/td&gt;&lt;td&gt;Sling loads using long lines.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Size 7&lt;/td&gt;&lt;td&gt;150 m&lt;/td&gt;&lt;td&gt;Night sling loads.&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;

      &lt;h3&gt;Marking / Controlling&lt;/h3&gt;
      &lt;ul&gt;
        &lt;li&gt;Phases: selecting, marking, controlling.&lt;/li&gt;
        &lt;li&gt;Obstacles: anything 18 in high/wide/deep. Use 4 R’s: remove, reduce, mark red, radio.&lt;/li&gt;
        &lt;li&gt;Ground slope: 0–7° all aircraft; 8–15° cargo and medium utility can land with advisory.&lt;/li&gt;
        &lt;li&gt;Slope formula: vertical distance × 57.3 / horizontal distance.&lt;/li&gt;
        &lt;li&gt;Approach/departure: obstacle buffer 10:1 reducible to 5:1; no crosswind over 9 kts; no tailwind over 5 kts.&lt;/li&gt;
        &lt;li&gt;HAT = humidity, altitude, temperature.&lt;/li&gt;
        &lt;li&gt;Nine NATO formations: trail, staggered trail right, staggered trail left, echelon right, echelon left, heavy right, heavy left, vee, diamond. Diamond = most secure.&lt;/li&gt;
      &lt;/ul&gt;

      &lt;h3&gt;Night Markings&lt;/h3&gt;
      &lt;div class=&quot;grid&quot;&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Inverted Y&lt;/strong&gt;Directional light at top, base light 7 m down, landing zone 14 m from there, stem lights 7 m out to sides; marks first TDP at night.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;NATO T&lt;/strong&gt;Base light top, flankers 10 m from base, directional light 10 m down, stem light 10 m down from directional.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Control Methods&lt;/strong&gt;Visual, electronic, verbal.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;p class=&quot;footer&quot;&gt;Good luck on your test! Created by one of your own. &lt;/p&gt;
  &lt;/main&gt;

    &lt;section id=&quot;inspection&quot;&gt;
      &lt;h2&gt;Inspection, Safety &amp; Stability&lt;/h2&gt;
      &lt;h3&gt;Inspection Rules&lt;/h3&gt;
      &lt;ul class=&quot;two-col&quot;&gt;
        &lt;li&gt;Inspect sling-load equipment &lt;strong&gt;before and after each use&lt;/strong&gt; and/or &lt;strong&gt;every 6 months&lt;/strong&gt;.&lt;/li&gt;
        &lt;li&gt;Qualified inspector: &lt;strong&gt;E-4/SPC or above&lt;/strong&gt; and Pathfinder, Air Assault, or SLICC graduate.&lt;/li&gt;
        &lt;li&gt;Clean metal sling-set portions with &lt;strong&gt;wire brush, emery cloth, or green scrub pad&lt;/strong&gt;.&lt;/li&gt;
        &lt;li&gt;Sling-leg rope material: &lt;strong&gt;double-braided nylon&lt;/strong&gt;.&lt;/li&gt;
        &lt;li&gt;If excess links are &lt;strong&gt;10 or more&lt;/strong&gt;, secure with &lt;strong&gt;Type III nylon&lt;/strong&gt;.&lt;/li&gt;
        &lt;li&gt;Proper drag surface is achieved using the &lt;strong&gt;proper link count&lt;/strong&gt;.&lt;/li&gt;
      &lt;/ul&gt;
      &lt;h3&gt;Unserviceable Criteria&lt;/h3&gt;
      &lt;div class=&quot;table-wrap compact&quot;&gt;
        &lt;table&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Item&lt;/th&gt;&lt;th&gt;Rule&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;td&gt;A-22 cargo bag&lt;/td&gt;&lt;td&gt;Unserviceable with &lt;strong&gt;3 or more&lt;/strong&gt; loose/broken stitches in a row, or &lt;strong&gt;5 or more&lt;/strong&gt; in a general area.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Aerial delivery sling&lt;/td&gt;&lt;td&gt;Unserviceable with &lt;strong&gt;3 or more&lt;/strong&gt; loose/broken stitches in a row, or &lt;strong&gt;5 or more&lt;/strong&gt; in a general area.&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;td&gt;Sling legs&lt;/td&gt;&lt;td&gt;Use damage criteria chart in &lt;strong&gt;TM 4-48.09, Chapter 6&lt;/strong&gt;.&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
      &lt;/div&gt;
      &lt;h3&gt;Static Discharge &amp; Ground Crew&lt;/h3&gt;
      &lt;div class=&quot;grid&quot;&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Static Discharge Wand&lt;/strong&gt;Discharges static electricity from the aircraft.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Grounding Rod&lt;/strong&gt;6–12 in deep at 45° angle, facing away from the load.&lt;/div&gt;
        &lt;div class=&quot;mini-card&quot;&gt;&lt;strong&gt;Ground Crew Uniform&lt;/strong&gt;Helmet, goggles, ear plugs, gloves, sleeves down, ID card, ID tags.&lt;/div&gt;
      &lt;/div&gt;
      &lt;h3&gt;Stability&lt;/h3&gt;
      &lt;div class=&quot;note warn&quot;&gt;
        &lt;strong&gt;HAT affects in-flight stability:&lt;/strong&gt; Humidity, Altitude, Temperature. Improve stability by increasing weight, redistributing load, adjusting link count, adding drogue chute, or reducing airspeed. Reducing airspeed is the least preferred method.
      &lt;/div&gt;
    &lt;/section&gt;

    &lt;section id=&quot;memory&quot;&gt;
      &lt;h2&gt;Short Memory Sheet&lt;/h2&gt;
      &lt;ul class=&quot;two-col&quot;&gt;
        &lt;li&gt;&lt;strong&gt;TM 4-48.09&lt;/strong&gt; = basic ops/equipment.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;TM 4-48.10&lt;/strong&gt; = single-point rigging.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;TM 4-48.11&lt;/strong&gt; = dual-point rigging.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;Minimum load&lt;/strong&gt; = 500 lbs.&lt;/li&gt;
        &lt;li&gt;&lt;strong&gt;UH-60A&lt;/strong&gt; = 8K hook.&lt;/li&gt;

"></iframe>
  </div>
  <script>
    function getHeaderOffset() {
      const switchBar = document.querySelector('.switch-bar');
      return switchBar ? switchBar.getBoundingClientRect().height + 12 : 0;
    }

    function resizeFrame(frame) {
      try {
        const doc = frame.contentWindow.document;
        const height = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight, doc.body.offsetHeight, doc.documentElement.offsetHeight);
        frame.style.height = height + 'px';
      } catch (e) { frame.style.height = '100vh'; }
    }

    function scrollParentToFrameTarget(frame, target) {
      const targetTop = target.getBoundingClientRect().top;
      const frameTop = frame.getBoundingClientRect().top;
      const top = window.scrollY + frameTop + targetTop - getHeaderOffset();
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    }

    function setupFrameNavigation(frame) {
      try {
        const doc = frame.contentWindow.document;
        doc.querySelectorAll('a[href^="#"]').forEach(function (link) {
          if (link.dataset.parentScrollReady === 'true') return;
          link.dataset.parentScrollReady = 'true';
          link.addEventListener('click', function (event) {
            const id = link.getAttribute('href').slice(1);
            const target = doc.getElementById(id);
            if (!target) return;

            event.preventDefault();
            resizeFrame(frame);
            scrollParentToFrameTarget(frame, target);
          });
        });
      } catch (e) {
        // srcdoc frames are same-origin; this fallback keeps the wrapper usable if that ever changes.
      }
    }

    function resizeVisibleFrame() {
      const activeFrame = document.querySelector('iframe.active');
      if (activeFrame) {
        resizeFrame(activeFrame);
        setupFrameNavigation(activeFrame);
      }
    }

    function showPhase(phase) {
      const phase1Frame = document.getElementById('phase1Frame');
      const phase2Frame = document.getElementById('phase2Frame');
      const phase1Btn = document.getElementById('phase1Btn');
      const phase2Btn = document.getElementById('phase2Btn');
      const isPhase2 = phase === 'phase2';
      const activeFrame = isPhase2 ? phase2Frame : phase1Frame;
      phase1Frame.classList.toggle('active', !isPhase2);
      phase2Frame.classList.toggle('active', isPhase2);
      phase1Btn.classList.toggle('active', !isPhase2);
      phase2Btn.classList.toggle('active', isPhase2);
      phase1Btn.setAttribute('aria-pressed', String(!isPhase2));
      phase2Btn.setAttribute('aria-pressed', String(isPhase2));
      document.title = isPhase2 ? 'Air Assault Phase II Study Sheet' : 'Air Assault Phase I Study Sheet';
      try {
        activeFrame.contentWindow.scrollTo(0, 0);
        activeFrame.contentWindow.location.hash = '';
      } catch (e) {}
      window.scrollTo({ top: 0, behavior: 'auto' });
      setupFrameNavigation(activeFrame);
      setTimeout(resizeVisibleFrame, 50);
      setTimeout(resizeVisibleFrame, 300);
    }

    window.addEventListener('load', function () {
      document.querySelectorAll('iframe').forEach(function (frame) {
        frame.addEventListener('load', function () {
          resizeFrame(frame);
          setupFrameNavigation(frame);
        });
        resizeFrame(frame);
        setupFrameNavigation(frame);
      });
      setTimeout(resizeVisibleFrame, 50);
      setTimeout(resizeVisibleFrame, 300);
      setTimeout(resizeVisibleFrame, 1000);
    });
    window.addEventListener('resize', resizeVisibleFrame);
  </script>
